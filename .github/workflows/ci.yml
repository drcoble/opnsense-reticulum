name: CI Pipeline

on:
  push:
    branches: [development, testing, main]
  pull_request:
    branches: [development, testing, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install ruff
          sudo apt-get update
          sudo apt-get install -y php-cli shellcheck libxml2-utils

      - name: PHP syntax check
        run: |
          echo "Checking PHP files..."
          find os-reticulum/src -name '*.php' -print0 | xargs -0 -n1 php -l
          echo "All PHP files passed syntax check."

      - name: Python lint (ruff)
        run: |
          ruff check os-reticulum/tests/ --select E,W,F --ignore E501

      - name: Python syntax check (py_compile)
        run: |
          find os-reticulum/tests -name '*.py' -print0 | xargs -0 python3 -m py_compile

      - name: Shell lint (shellcheck)
        run: |
          find os-reticulum/src -name '*.sh' -print0 | xargs -0 shellcheck -s sh

      - name: XML validation
        run: |
          echo "Validating XML files..."
          find os-reticulum/src -name '*.xml' -print0 | xargs -0 -n1 xmllint --noout
          echo "All XML files passed validation."
