name: Unit Tests

on:
  push:
    branches: [development, testing, main]
  pull_request:
    branches: [development, testing, main]

jobs:
  pytest:
    name: Template & Model Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r os-reticulum/tests/requirements-test.txt

      - name: Run pytest
        run: |
          cd os-reticulum
          pytest tests/template tests/model tests/security \
            -v --tb=short --junit-xml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.run_number }}
          path: os-reticulum/test-results.xml
